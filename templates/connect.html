<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kết nối hệ thống</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="page-bg">
    <main class="connect-wrap fade-in">
      <section class="connect-header card">
        <div>
          <div class="school-badge">TRANG KẾT NỐI</div>
          <h2>Hệ thống nhận diện côn trùng</h2>
        </div>

        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="sub-btn" onclick="startStream()">Kết nối</button>
          <button class="sub-btn" onclick="stopStream()">Ngắt kết nối</button>
          <button class="sub-btn" onclick="goHome()">Quay lại</button>
        </div>
      </section>

      <section class="panel-grid">
        <div class="card panel-card">
          <div class="card-head">
            <h3>Khung xem hiện tại</h3>
            <button class="sub-btn" onclick="refreshPreview()">Làm mới</button>
          </div>

          <div class="viewer-box">
            <img id="previewImage" src="" alt="Khung xem hiện tại" class="preview-image hidden" />
            <div id="previewPlaceholder" class="placeholder">
              Chưa có dữ liệu hình ảnh
            </div>
          </div>
        </div>

        <div class="card panel-card">
          <div class="card-head">
            <h3>Kết quả nhận diện</h3>
            <button class="sub-btn" onclick="runDetectDemo()">Nhận diện thử</button>
          </div>

          <div id="resultList" class="result-list">
            <div class="result-empty">Chưa có dữ liệu nhận diện</div>
          </div>
        </div>
      </section>

      <section class="status-grid">
        <div class="card status-card">
          <span>Trạng thái</span>
          <strong id="statusText">Chưa kết nối</strong>
        </div>

        <div class="card status-card">
          <span>API</span>
          <strong id="apiText">Chưa kiểm tra</strong>
        </div>

        <div class="card status-card">
          <span>Thiết bị</span>
          <strong id="deviceText">Chưa có dữ liệu</strong>
        </div>
      </section>

      <section class="card log-card">
        <div class="card-head">
          <h3>Nhật ký hệ thống</h3>
          <button class="sub-btn" onclick="checkHealth()">Kiểm tra API</button>
        </div>

        <div id="logBox" class="log-box">
          <div>Hệ thống sẵn sàng.</div>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
